name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cedar-policy-cli
        run: |
          curl -L -o cedar-cli.tar.gz \
            https://github.com/cedar-policy/cedar/releases/latest/download/cedar-policy-cli-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf cedar-cli.tar.gz
          chmod +x cedar-policy-cli
          sudo mv cedar-policy-cli /usr/local/bin/

      - name: Validate JSON schema parses
        run: |
          python3 -c "import json; json.load(open('schemas/agent-actions.cedarschema.json'))"
          echo "Schema JSON is well-formed."

      - name: Validate each policy against schema
        run: |
          for policy in policies/*.cedar; do
            echo "Validating $policy..."
            cedar-policy-cli validate \
              --schema schemas/agent-actions.cedarschema.json \
              --schema-format json \
              --policies "$policy" \
              || exit 1
          done
          echo "All policies validate against the schema."

  typescript-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/typescript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build
